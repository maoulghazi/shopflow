version: '3.9'

# Production Docker Compose
# Usage: docker-compose -f docker-compose.prod.yml up --build
#
# Uses multi-stage Dockerfiles, no volume mounts, built images only.
# Mirrors what will run in EKS.

services:
  db:
    image: postgres:16-alpine
    container_name: shopflow-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-shopflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      POSTGRES_DB: ${DB_NAME:-shopflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-shopflow}']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: ../infra/docker/Dockerfile.api
      target: runner
    container_name: shopflow-api
    restart: always
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${DB_USER:-shopflow}:${DB_PASSWORD}@db:5432/${DB_NAME:-shopflow}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - '4000:4000'
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: ../infra/docker/Dockerfile.frontend
      target: runner
    container_name: shopflow-frontend
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${API_URL:-http://api:4000}
    ports:
      - '3001:3000'
    depends_on:
      - api

volumes:
  postgres_data:

networks:
  default:
    name: shopflow-prod-network
