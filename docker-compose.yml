services:
  db:
    image: postgres:16-alpine
    container_name: shopflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: shopflow
      POSTGRES_PASSWORD: shopflow
      POSTGRES_DB: shopflow
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U shopflow']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: ../infra/docker/Dockerfile.api
    container_name: shopflow-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://shopflow:shopflow@db:5432/shopflow
      FRONTEND_URL: http://localhost:3001
    ports:
      - '4000:4000'
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npx prisma db push && npx prisma db seed && node dist/index.js"

  frontend:
    build:
      context: ./frontend
      dockerfile: ../infra/docker/Dockerfile.frontend
    container_name: shopflow-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - '3001:3000'
    depends_on:
      - api

volumes:
  postgres_data:

networks:
  default:
    name: shopflow-network
